# mahoote = محوطه. Record-only NVR. Camera RTSP password inline in URLs.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # generator: password admin123
    generator:
      - rtsp://admin:admin123@192.168.51.10:554/Streaming/Channels/102
    # moved from center22 (parking) — IP cam .132, password admin123
    parking_villa:
      - rtsp://admin:admin123@192.168.51.132:554/Streaming/Channels/102
    # --- شناسایی‌شده در temp و منتقل‌شده به محوطه (password admin123 مگر ذکر شود) ---
    cam_30:
      - rtsp://admin:admin123@192.168.51.30:554/Streaming/Channels/102
    cam_71:
      - rtsp://admin:admin123@192.168.51.71:554/Streaming/Channels/102
    cam_2:

# anbar = انبار. Record-only NVR. جدا از پارکینگ (center22).
# انبار مرکزی و خانه‌داری روی DVR .222، انبار IP روی .97.
# cam_95 (خانه‌داری) به temp منتقل شد برای بررسی (به‌درخواست کاربر).
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false
  fps: 3

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    dvr_parking4_ch4:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=4_stream=0.sdp?real_stream
    dvr_parking4_ch5:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=5_stream=0.sdp?real_stream
    cam_97:
      - rtsp://admin:admin123@192.168.51.97:554/Streaming/Channels/102

cameras:
  dvr_parking4_ch4:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/dvr_parking4_ch4, input_args: preset-rtsp-restream, roles: [record] }] }
  dvr_parking4_ch5:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/dvr_parking4_ch5, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_97:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_97, input_args: preset-rtsp-restream, roles: [record] }] }

version: 0.16-0

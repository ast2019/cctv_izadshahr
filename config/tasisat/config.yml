# tasisat = تاسیسات. Record-only NVR.
# دیوار غربی در محدوده تصفیه‌خانه فاضلاب و پشت لاله: cam_61 تا cam_65.
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false
  fps: 3

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # دیوار غربی — تصفیه‌خانه فاضلاب و پشت لاله (password admin123)
    cam_61:
      - rtsp://admin:admin123@192.168.51.61:554/Streaming/Channels/102
    cam_62:
      - rtsp://admin:admin123@192.168.51.62:554/Streaming/Channels/102
    cam_63:
      - rtsp://admin:admin123@192.168.51.63:554/Streaming/Channels/102
    cam_64:
      - rtsp://admin:admin123@192.168.51.64:554/Streaming/Channels/102
    cam_65:
      - rtsp://admin:admin123@192.168.51.65:554/Streaming/Channels/102

cameras:
  cam_61:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_61, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_62:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_62, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_63:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_63, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_64:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_64, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_65:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_65, input_args: preset-rtsp-restream, roles: [record] }] }

version: 0.16-0

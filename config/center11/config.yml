# center11 = پذیرش و ورودی مجتمع (reception / complex entrance). cam_201 = duplicate of cam_41 — removed.
# Camera RTSP password is inline in each URL (admin:admin123, or 1259110%40av for new reception cams).
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: motion

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    cam_5:
      - rtsp://admin:admin123@192.168.51.5:554/Streaming/Channels/102
    cam_6:
      - rtsp://admin:admin123@192.168.51.6:554/Streaming/Channels/102
    cam_9:
      - rtsp://admin:admin123@192.168.51.9:554/Streaming/Channels/102
    # cam_16: offline — disabled temporarily
    #   - rtsp://admin:admin123@192.168.51.16:554/Streaming/Channels/102
    # cam_14 (.14): DO NOT re-enable — same camera is now active as
    # restoran_sandogh in config/restaurant/config.yml
    # cam_13 moved to restaurant (رستوران) — was misgrouped under reception
    cam_41:
      - rtsp://admin:admin123@192.168.51.41:554/Streaming/Channels/102
    cam_4:
      - rtsp://admin:admin123@192.168.51.4:554/Streaming/Channels/102
    # Reception (پذیرش) — password 1259110@av (@ encoded as %40 in URL).
    paziresh_be_pol:
      - rtsp://admin:1259110%40av@192.168.51.134:554/Streaming/Channels/102
    paziresh_be_sahel:
      - rtsp://admin:1259110%40av@192.168.51.135:554/Streaming/Channels/102
    # cam_112 (.112) اتاق سرور — منتقل شد از temp (به‌درخواست کاربر). password admin123.
    cam_112:
      - rtsp://admin:admin123@192.168.51.112:554/Streaming/Channels/102
    # shargh_vorodi (.131) حذف شد — کار نمی‌کرد (به‌درخواست کاربر).

cameras:
  cam_5:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_5
          input_args: preset-rtsp-restream
          roles: [record]
  cam_6:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_6
          input_args: preset-rtsp-restream
          roles: [record]
  cam_9:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_9
          input_args: preset-rtsp-restream
          roles: [record]
  # cam_16: offline — disabled temporarily
  # cam_14: now active as restoran_sandogh in restaurant — do not re-enable here
  # cam_13 moved to restaurant
  cam_41:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_41
          input_args: preset-rtsp-restream
          roles: [record]
  cam_4:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_4
          input_args: preset-rtsp-restream
          roles: [record]
  paziresh_be_pol:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/paziresh_be_pol
          input_args: preset-rtsp-restream
          roles: [record]
  paziresh_be_sahel:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/paziresh_be_sahel
          input_args: preset-rtsp-restream
          roles: [record]
  cam_112:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_112
          input_args: preset-rtsp-restream
          roles: [record]

version: 0.16-0

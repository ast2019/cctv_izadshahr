# =============================================================================
# center11 — SKELETON. Fill in real cameras, then: docker compose up -d frigate-center11
# Password goes in .env as FRIGATE_CENTER11_PASSWORD; username/IP go inline below.
# =============================================================================
mqtt:
  enabled: false

detectors:
  cpu1:
    type: cpu

birdseye:
  enabled: false

record:
  enabled: false

snapshots:
  enabled: false

detect:
  enabled: false

cameras:
  # Example camera — set enabled: true and fix the IP/path to activate it.
  example_cam:
    enabled: false
    ffmpeg:
      inputs:
        - path: rtsp://admin:{FRIGATE_CENTER11_PASSWORD}@192.168.1.10:554/cam/realmonitor?channel=1&subtype=0
          roles: [detect]

version: 0.16-0

# =============================================================================
# cafe — NVR-only (record + live view, NO detection). Tuned for low CPU:
#   * go2rtc pulls each camera ONCE (main stream, full quality).
#   * recording reads from the local restream => 1 connection per camera.
#   * record uses stream copy (no re-encode) => native quality, minimal CPU.
# Shared password lives in .env as FRIGATE_RTSP_PASSWORD (username/IP inline).
#
# STATUS: DVR (192.168.51.204) works. The 5 IP cameras are commented out at the
# bottom until each one's correct RTSP URL / codec is confirmed (see notes).
# =============================================================================
mqtt:
  enabled: false

detect:
  enabled: false

record:
  enabled: true
  sync_recordings: true
  expire_interval: 60
  retain:
    days: 2
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

# One connection per camera. Frigate substitutes {FRIGATE_RTSP_PASSWORD} here.
go2rtc:
  streams:
    dvr_cafe_ch1:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=1&subtype=0
    dvr_cafe_ch2:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=2&subtype=0
    dvr_cafe_ch4:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=4&subtype=0
    dvr_cafe_ch5:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=5&subtype=0
    dvr_cafe_ch6:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=6&subtype=0
    dvr_cafe_ch7:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=7&subtype=0
    dvr_cafe_ch8:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=8&subtype=0
    dvr_cafe_ch10:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=10&subtype=0

    # --- IP cameras: disabled until each URL/codec is confirmed --------------
    # ipcam_parking3_90:   # was: unspecified size on /Streaming/Channels/101 -> try /stream1
    #   - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.90:554/stream1
    # ipcam_parking3_89:   # was: connection timed out -> verify it is online / correct path
    #   - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.89:554/stream1
    # ipcam_ashpazkhane_99:  # H.265 multi-layer: copies fine (record), set cam to H.264 for live
    #   - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.99:554/Streaming/Channels/101
    # ipcam_rest_100:      # was: connection timed out
    #   - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.100:554/Streaming/Channels/101
    # ipcam_rest_101:      # was: connection timed out -> try /stream1
    #   - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.101:554/stream1

cameras:
  dvr_cafe_ch1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch1
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch2:

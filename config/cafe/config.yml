mqtt:
  enabled: false

detectors:
  cpu1:
    type: cpu

birdseye:
  enabled: false

record:
  enabled: true
  sync_recordings: true
  expire_interval: 60
  retain:
    days: 2
    mode: all

snapshots:
  enabled: false

detect:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  input_args: preset-rtsp-generic
  output_args:
    record: preset-record-generic

# Password comes from .env as FRIGATE_CAFE_PASSWORD (username/IP are inline).
cameras:
  dvr_cafe_ch1:
    ffmpeg:
      inputs:
        - path: rtsp://admin:{FRIGATE_CAFE_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=1&subtype=1
          roles: [detect]
        - path: rtsp://admin:{FRIGATE_CAFE_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=1&subtype=0
          roles: [record]
    motion:
      threshold: 30
      contour_area: 10
      improve_contrast: false


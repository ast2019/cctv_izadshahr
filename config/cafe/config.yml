# cafe — record-only NVR (no detection). Password: FRIGATE_RTSP_PASSWORD in .env
mqtt:
  enabled: false

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 2
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    dvr_cafe_ch1:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=1&subtype=0
    dvr_cafe_ch2:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=2&subtype=0
    dvr_cafe_ch4:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=4&subtype=0
    dvr_cafe_ch5:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=5&subtype=0
    dvr_cafe_ch6:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=6&subtype=0
    dvr_cafe_ch7:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=7&subtype=0
    dvr_cafe_ch8:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=8&subtype=0
    dvr_cafe_ch10:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.51.204:554/cam/realmonitor?channel=10&subtype=0

cameras:
  dvr_cafe_ch1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch1
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch2:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch2
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch4:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch4
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch5:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch5
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch6:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch6
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch7:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch7
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch8:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch8
          input_args: preset-rtsp-restream

# cafe — record-only NVR (no detection). Camera RTSP password inline in URLs.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    dvr_cafe_ch1:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=1&subtype=0
    dvr_cafe_ch2:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=2&subtype=0
    dvr_cafe_ch4:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=4&subtype=0
    dvr_cafe_ch5:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=5&subtype=0
    dvr_cafe_ch6:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=6&subtype=0
    dvr_cafe_ch7:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=7&subtype=0
    dvr_cafe_ch8:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=8&subtype=0
    dvr_cafe_ch3:
      - rtsp://admin:admin123@192.168.51.204:554/cam/realmonitor?channel=3&subtype=0
    # IP cameras — cafe area. Password 1259110@av (@ encoded as %40 in URL).
    view_cafe_gharb:
      - rtsp://admin:1259110%40av@192.168.51.52:554/Streaming/Channels/102
    vorodi_cafe:
      - rtsp://admin:1259110%40av@192.168.51.49:554/Streaming/Channels/102
    view_cafe_shargh:
      - rtsp://admin:1259110%40av@192.168.51.53:554/Streaming/Channels/102

cameras:
  dvr_cafe_ch1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_cafe_ch1
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_cafe_ch2:

# center22 = پارکینگ. Record-only NVR.
# .89 و .90 عمداً حذف شده‌اند چون کار نمی‌کردند؛ انبار نیز در نمونه anbar است.
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # DVR پارکینگ۴؛ کانال‌های ۴ و ۵ در نمونه anbar هستند.
    dvr_parking4_ch1:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=1_stream=0.sdp?real_stream
    dvr_parking4_ch2:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=2_stream=0.sdp?real_stream
    dvr_parking4_ch3:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=3_stream=0.sdp?real_stream
    # دوربین‌های پارکینگ (password admin123)
    cam_2:
      - rtsp://admin:admin123@192.168.51.2:554/Streaming/Channels/102
    cam_8:
      - rtsp://admin:admin123@192.168.51.8:554/Streaming/Channels/102
    cam_42:
      - rtsp://admin:admin123@192.168.51.42:554/Streaming/Channels/102
    cam_45:
      - rtsp://admin:admin123@192.168.51.45:554/Streaming/Channels/102
    cam_46:
      - rtsp://admin:admin123@192.168.51.46:554/Streaming/Channels/102
    cam_82:
      - rtsp://admin:admin123@192.168.51.82:554/Streaming/Channels/102
    cam_83:
      - rtsp://admin:admin123@192.168.51.83:554/Streaming/Channels/102
    cam_86:
      - rtsp://admin:admin123@192.168.51.86:554/Streaming/Channels/102
    cam_91:
      - rtsp://admin:admin123@192.168.51.91:554/Streaming/Channels/102
    cam_92:
      - rtsp://admin:admin123@192.168.51.92:554/Streaming/Channels/102
    cam_93:
      - rtsp://admin:admin123@192.168.51.93:554/Streaming/Channels/102
    cam_94:
      - rtsp://admin:admin123@192.168.51.94:554/Streaming/Channels/102
    cam_98:
      - rtsp://admin:admin123@192.168.51.98:554/Streaming/Channels/102

cameras:
  dvr_parking4_ch1:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/dvr_parking4_ch1, input_args: preset-rtsp-restream, roles: [record] }] }
  dvr_parking4_ch2:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/dvr_parking4_ch2, input_args: preset-rtsp-restream, roles: [record] }] }
  dvr_parking4_ch3:

# =============================================================================
# center22 — SKELETON (NVR-only pattern). Fill in real cameras, then:
#   docker compose up -d frigate-center22
# Shared password: FRIGATE_RTSP_PASSWORD (in .env). Username/IP go inline.
# =============================================================================
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

# Fill these in. One go2rtc stream + one record-only camera per channel.
go2rtc:
  streams: {}
  #  cam1:
  #    - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.10:554/cam/realmonitor?channel=1&subtype=0

cameras: {}
  #  cam1:
  #    ffmpeg:
  #      inputs:
  #        - path: rtsp://127.0.0.1:8554/cam1
  #          input_args: preset-rtsp-restream
  #          roles: [record]

version: 0.16-0

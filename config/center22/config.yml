# center22 = پارکینگ (parking). Record-only NVR. Camera RTSP password inline in URLs.
# چند پارکینگ داریم؛ فعلاً «پارکینگ ویلا» فعال است. DVR پارکینگ۴ (192.168.51.222)
# در docs/CAMERAS.md مستند است و در صورت نیاز همین‌جا اضافه می‌شود.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

# parking_villa (.132) moved to mahoote. No cameras remain in this instance,
# so frigate-center22 will NOT start until a camera is added below.
go2rtc:
  streams: {}

cameras: {}

version: 0.16-0

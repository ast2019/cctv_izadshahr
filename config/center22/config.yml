# center22 = پارکینگ (parking). Record-only NVR. Camera RTSP password inline in URLs.
# فعال: DVR پارکینگ۴ (192.168.51.222، ۵ کانال). دوربین‌های parking3 (.89/.90)
# حذف شدند چون کار نمی‌کردند. parking_villa قبلاً به mahoote منتقل شده.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

# center22 = پارکینگ. Record-only NVR. parking_villa moved to mahoote.
# Parking cameras added here for testing — several timed out in earlier probes.
go2rtc:
  streams:
    # NOTE: ipcam_parking3_89 (.89) و ipcam_parking3_90 (.90) حذف شدند چون
    # کار نمی‌کردند (timeout / استریم بی‌اعتبار).
    # parking4 DVR (.222) — 5 channels, .sdp URL format (ch4/ch5 = warehouses).
    dvr_parking4_ch1:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=1_stream=0.sdp?real_stream
    dvr_parking4_ch2:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=2_stream=0.sdp?real_stream
    dvr_parking4_ch3:
      - rtsp://192.168.51.222:554/user=admin_password=admin123_channel=3_stream=0.sdp?real_stream
    # NOTE: dvr_parking4_ch4/ch5 (انبار مرکزی/خانه‌داری) و cam_97/cam_98 (انبار)
    # به نمونه‌ی جدید anbar منتقل شدند تا انبار از پارکینگ جدا باشد.
    # --- پارکینگ: شناسایی‌شده در temp و منتقل‌شده (password admin123) ---
    cam_8:
      - rtsp://admin:admin123@192.168.51.8:554/Streaming/Channels/102
    cam_91:
      - rtsp://admin:admin123@192.168.51.91:554/Streaming/Channels/102
    cam_92:
      - rtsp://admin:admin123@192.168.51.92:554/Streaming/Channels/102
    cam_93:
      - rtsp://admin:admin123@192.168.51.93:554/Streaming/Channels/102
    cam_94:
      - rtsp://admin:admin123@192.168.51.94:554/Streaming/Channels/102

cameras:
  dvr_parking4_ch1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_parking4_ch1
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_parking4_ch2:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_parking4_ch2
          input_args: preset-rtsp-restream
          roles: [record]
  dvr_parking4_ch3:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/dvr_parking4_ch3
          input_args: preset-rtsp-restream
          roles: [record]
  cam_8:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_8
          input_args: preset-rtsp-restream
          roles: [record]
  cam_91:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_91
          input_args: preset-rtsp-restream
          roles: [record]
  cam_92:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_92
          input_args: preset-rtsp-restream
          roles: [record]
  cam_93:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_93
          input_args: preset-rtsp-restream
          roles: [record]
  cam_94:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_94
          input_args: preset-rtsp-restream
          roles: [record]

version: 0.16-0

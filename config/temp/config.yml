# =============================================================================
# TEMPORARY instance — دوربین‌های باقی‌مانده برای بررسی
# بیشتر دوربین‌ها شناسایی و به نمونه‌های دائمی منتقل شدند. این‌ها مانده‌اند:
#   - بدون تصویر / نیاز به بررسی: cam_21, cam_85, cam_88, cam_96
#   - هنوز مقصد مشخص نشده:        cam_82, cam_112
# بعد از تعیین تکلیف این ۶ تا، کل نمونه temp حذف می‌شود (سرویس، مسیر nginx، کارت).
# =============================================================================
mqtt:
  enabled: false

# نمونه‌ی موقتِ داخلی — احراز هویت خاموش تا بدون لاگین باز شود.
auth:
  enabled: false

detect:
  enabled: false

# فقط live view برای بررسی — ضبط خاموش (بار سرور تقریباً صفر در حالت بیکار).
record:
  enabled: false

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # --- بدون تصویر در تست قبلی (timeout) — نیاز به بررسی ---
    cam_21:
      - rtsp://admin:admin123@192.168.51.21:554/Streaming/Channels/102
    cam_85:
      - rtsp://admin:admin123@192.168.51.85:554/Streaming/Channels/102
    cam_88:
      - rtsp://admin:admin123@192.168.51.88:554/Streaming/Channels/102
    cam_96:
      - rtsp://admin:admin123@192.168.51.96:554/Streaming/Channels/102
    # --- مقصد هنوز مشخص نشده ---
    cam_82:
      - rtsp://admin:admin123@192.168.51.82:554/Streaming/Channels/102
    cam_112:
      - rtsp://admin:admin123@192.168.51.112:554/Streaming/Channels/102

cameras:
  cam_21:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_21, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_85:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_85, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_88:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_88, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_96:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_96, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_82:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_82, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_112:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_112, input_args: preset-rtsp-restream, roles: [record] }] }

version: 0.16-0

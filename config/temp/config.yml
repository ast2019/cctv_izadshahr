# =============================================================================
# TEMPORARY instance — دوربین‌های باقی‌مانده برای بررسی
# بدون تصویر / نیاز به بررسی: cam_21, cam_85, cam_88, cam_96
# برگردانده‌شده برای بررسی مجدد (قبلاً به‌عنوان خراب حذف شده بودند):
#   cam_89, cam_90 (پارکینگ۳)، cam_99 (ظرف‌شویی/آشپزخانه)،
#   cam_100 (درب پشت رستوران)، cam_101 (ورودی رستوران)
# منتقل‌شده برای بررسی: cam_95 (خانه‌داری، از anbar)
# (cam_112 اتاق سرور منتقل شد به center11/پذیرش.)
# بعد از تعیین تکلیف این دوربین‌ها، کل نمونه temp حذف می‌شود.
# =============================================================================
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

# فقط live view برای بررسی؛ ضبط دوربین‌های دائمی در نمونه مقصد روشن است.
record:
  enabled: false

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    cam_21:
      - rtsp://admin:admin123@192.168.51.21:554/Streaming/Channels/102
    cam_85:
      - rtsp://admin:admin123@192.168.51.85:554/Streaming/Channels/102
    cam_88:
      - rtsp://admin:admin123@192.168.51.88:554/Streaming/Channels/102
    cam_96:
      - rtsp://admin:admin123@192.168.51.96:554/Streaming/Channels/102
    # برگردانده‌شده برای بررسی مجدد — password admin123
    cam_89:
      - rtsp://admin:admin123@192.168.51.89:554/Streaming/Channels/102
    cam_90:
      - rtsp://admin:admin123@192.168.51.90:554/Streaming/Channels/102
    cam_99:
      - rtsp://admin:admin123@192.168.51.99:554/Streaming/Channels/102
    cam_100:
      - rtsp://admin:admin123@192.168.51.100:554/Streaming/Channels/102
    cam_101:
      - rtsp://admin:admin123@192.168.51.101:554/Streaming/Channels/102
    # خانه‌داری — منتقل‌شده از anbar برای بررسی (password admin123)
    cam_95:
      - rtsp://admin:admin123@192.168.51.95:554/Streaming/Channels/102

cameras:
  cam_21:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_21, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_85:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_85, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_88:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_88, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_96:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_96, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_89:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_89, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_90:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_90, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_99:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_99, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_100:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_100, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_101:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_101, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_95:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_95, input_args: preset-rtsp-restream, roles: [record] }] }

version: 0.16-0

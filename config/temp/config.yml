# TEMPORARY instance вҖ” ШҜЩҲШұШЁЫҢЩҶвҖҢЩҮШ§ЫҢ ШҙЩҶШ§ШіШ§ЫҢЫҢвҖҢЩҶШҙШҜЩҮ / ЩҒШ№Ш§Щ„вҖҢЩҶШҙШҜЩҮ Щ…ШұЪ©ШІ
# ЩҮШҜЩҒ: Щ…ШұЩҲШұ ШІЩҶШҜЩҮвҖҢЫҢ ЩҮЩ…ЩҮ ШҜЩҲШұШЁЫҢЩҶвҖҢЩҮШ§ЫҢ ШЁШ§ЩӮЫҢвҖҢЩ…Ш§ЩҶШҜЩҮ ШЁШұШ§ЫҢ ШҙЩҶШ§ШіШ§ЫҢЫҢ ЩҲ Щ…ШұШӘШЁвҖҢШіШ§ШІЫҢ.
# ЩҫШі Ш§ШІ ШҙЩҶШ§ШіШ§ЫҢЫҢШҢ Ш§ЫҢЩҶ ЩҶЩ…ЩҲЩҶЩҮ ЩҲ ЩҫЩҲШҙЩҮвҖҢШ§Шҙ ШӯШ°ЩҒ Щ…ЫҢвҖҢШҙЩҲШҜ (ШіШұЩҲЫҢШі frigate-temp ШҜШұ
# docker-compose.yml + Щ…ШіЫҢШұЩҮШ§ЫҢ /temp/ ШҜШұ nginx + Ъ©Ш§ШұШӘ temp ШҜШұ sites.js).
# ЩҮЩ…ЩҮ ШҜЩҲШұШЁЫҢЩҶвҖҢЩҮШ§ IP Щ…ШұЪ©ШІШҢ ШұЩ…ШІ admin123ШҢ Щ…ШіЫҢШұ /Streaming/Channels/102.
# =============================================================================
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

# ЩҒЩӮШ· live view ШЁШұШ§ЫҢ ШҙЩҶШ§ШіШ§ЫҢЫҢ вҖ” Ш¶ШЁШ· Ъ©Ш§Щ…Щ„Ш§ЩӢ Ш®Ш§Щ…ЩҲШҙ. ШЁШ§ Ш§ЫҢЩҶ Ъ©Ш§Шұ go2rtc ЩҒЩӮШ· ЩҲЩӮШӘЫҢ ЫҢЪ©
# ШҜЩҲШұШЁЫҢЩҶ ШұШ§ ШЁШ§ШІ Щ…ЫҢвҖҢЪ©ЩҶЫҢ ШЁЩҮ ШўЩҶ ЩҲШөЩ„ Щ…ЫҢвҖҢШҙЩҲШҜШӣ ЩҫШі ШЁШ§Шұ ШіШұЩҲШұ ШҜШұ ШӯШ§Щ„ШӘ ШЁЫҢЪ©Ш§Шұ ШӘЩӮШұЫҢШЁШ§ЩӢ ШөЩҒШұ Ш§ШіШӘ
# ЩҲ ЩҶЩ…ЩҲЩҶЩҮ ШЁШ§ ЫіЫ· ШҜЩҲШұШЁЫҢЩҶ ЩҮЩ… ШЁШҜЩҲЩҶ Щ…ШҙЪ©Щ„ ШЁШ§Щ„Ш§ Щ…ЫҢвҖҢШўЫҢШҜ (Щ…ЩҶШ§ШіШЁ ШіШұЩҲШұ ЩҒЩӮШ·-CPU).
record:
  enabled: false

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic


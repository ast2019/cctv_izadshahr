# sahel = ساحل. Record-only NVR. Camera RTSP password inline in URLs.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # Password 1259110@av (@ encoded as %40 in URL)
    sahel_shargh:
      - rtsp://admin:1259110%40av@192.168.51.54:554/Streaming/Channels/102
    sahel_gharb_47:
      - rtsp://admin:1259110%40av@192.168.51.47:554/Streaming/Channels/102
    sahel_gharb_48:
      - rtsp://admin:1259110%40av@192.168.51.48:554/Streaming/Channels/102
    # moved from cafe -> mahoote -> sahel — IP cam .53, password 1259110@av (@ encoded as %40)
    view_cafe_shargh:
      - rtsp://admin:1259110%40av@192.168.51.53:554/Streaming/Channels/102
    # sahel_kanex (.16) منتقل شد به entezamat (به‌درخواست کاربر).

cameras:
  sahel_shargh:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/sahel_shargh
          input_args: preset-rtsp-restream
          roles: [record]
  sahel_gharb_47:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/sahel_gharb_47
          input_args: preset-rtsp-restream
          roles: [record]
  sahel_gharb_48:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/sahel_gharb_48
          input_args: preset-rtsp-restream
          roles: [record]
  view_cafe_shargh:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/view_cafe_shargh
          input_args: preset-rtsp-restream
          roles: [record]

version: 0.16-0

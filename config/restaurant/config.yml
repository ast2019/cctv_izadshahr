# restaurant = رستوران. Record-only NVR. Camera RTSP password inline in URLs.
mqtt:
  enabled: false

# Portal proxies over plain HTTP (port 8888) — cookie must NOT be Secure,
# and 30-day sessions so the UI stops asking for the password every day.
auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # Password 1259110@av (@ encoded as %40 in URL)
    restoran_paeen:
      - rtsp://admin:1259110%40av@192.168.51.136:554/Streaming/Channels/102
    restoran_bala:
      - rtsp://admin:1259110%40av@192.168.51.137:554/Streaming/Channels/102
    # Password admin123
    restoran_sandogh:
      - rtsp://admin:admin123@192.168.51.14:554/Streaming/Channels/102
    # Moved from center11 — restaurant area (admin123)
    cam_13:
      - rtsp://admin:admin123@192.168.51.13:554/Streaming/Channels/102
    # NOTE: ipcam_rest_100/101 (.100/.101) و ipcam_ashpazkhane_99 (.99) حذف شدند
    # چون کار نمی‌کردند (timeout در تست‌ها).
    # --- شناسایی‌شده در temp و منتقل‌شده به رستوران (password admin123) ---
    cam_18:
      - rtsp://admin:admin123@192.168.51.18:554/Streaming/Channels/102
    cam_19:
      - rtsp://admin:admin123@192.168.51.19:554/Streaming/Channels/102
    cam_31:
      - rtsp://admin:admin123@192.168.51.31:554/Streaming/Channels/102

cameras:
  restoran_paeen:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/restoran_paeen
          input_args: preset-rtsp-restream
          roles: [record]
  restoran_bala:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/restoran_bala
          input_args: preset-rtsp-restream
          roles: [record]
  restoran_sandogh:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/restoran_sandogh
          input_args: preset-rtsp-restream
          roles: [record]
  cam_13:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_13
          input_args: preset-rtsp-restream
          roles: [record]
  cam_18:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_18
          input_args: preset-rtsp-restream
          roles: [record]
  cam_19:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_19
          input_args: preset-rtsp-restream
          roles: [record]
  cam_31:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam_31
          input_args: preset-rtsp-restream
          roles: [record]

version: 0.16-0

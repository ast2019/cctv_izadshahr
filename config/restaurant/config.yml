# restaurant = رستوران. Record-only NVR. Camera RTSP password inline in URLs.
mqtt:
  enabled: false

auth:
  cookie_secure: false
  session_length: 2592000
  refresh_time: 1296000

detect:
  enabled: false
  fps: 3

record:
  enabled: true
  retain:
    days: 1
    mode: all

snapshots:
  enabled: false

birdseye:
  enabled: false

ffmpeg:
  global_args: -hide_banner -loglevel warning
  output_args:
    record: preset-record-generic

go2rtc:
  streams:
    # Password 1259110@av (@ encoded as %40 in URL)
    restoran_paeen:
      - rtsp://admin:1259110%40av@192.168.51.136:554/Streaming/Channels/102
    restoran_bala:
      - rtsp://admin:1259110%40av@192.168.51.137:554/Streaming/Channels/102
    # Password admin123
    restoran_sandogh:
      - rtsp://admin:admin123@192.168.51.14:554/Streaming/Channels/102
    cam_13:
      - rtsp://admin:admin123@192.168.51.13:554/Streaming/Channels/102
    cam_17:
      - rtsp://admin:admin123@192.168.51.17:554/Streaming/Channels/102
    cam_18:
      - rtsp://admin:admin123@192.168.51.18:554/Streaming/Channels/102
    cam_19:
      - rtsp://admin:admin123@192.168.51.19:554/Streaming/Channels/102
    # cam_99 (ظرف‌شویی/آشپزخانه) درست شد و برگشت به رستوران — password admin123
    cam_99:
      - rtsp://admin:admin123@192.168.51.99:554/Streaming/Channels/102
    # cam_81/cam_84 (بالای رستوران بیرون) منتقل شدند به mahoote (محوطه).
    # .100/.101 برای بررسی در نمونه temp هستند.

cameras:
  restoran_paeen:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/restoran_paeen, input_args: preset-rtsp-restream, roles: [record] }] }
  restoran_bala:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/restoran_bala, input_args: preset-rtsp-restream, roles: [record] }] }
  restoran_sandogh:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/restoran_sandogh, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_13:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_13, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_17:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_17, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_18:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_18, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_19:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_19, input_args: preset-rtsp-restream, roles: [record] }] }
  cam_99:
    ffmpeg: { inputs: [{ path: rtsp://127.0.0.1:8554/cam_99, input_args: preset-rtsp-restream, roles: [record] }] }

version: 0.16-0

# =============================================================================
# Frigate — simple multi-instance stack
# Bring up everything:      docker compose up -d
# Bring up one instance:    docker compose up -d frigate-cafe
# View logs:                docker compose logs -f frigate-cafe
# =============================================================================
name: frigate

x-frigate-common: &frigate-common
  image: ghcr.io/blakeblackshear/frigate:0.16.3
  restart: unless-stopped
  stop_grace_period: 30s
  shm_size: "1gb"   # enough for ~13 cameras; tmpfs grows on demand up to this cap
  tmpfs:
    - /tmp/cache
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  frigate-cafe:
    <<: *frigate-common
    container_name: frigate-cafe
    volumes:
      - ./config/cafe:/config
      - ./media/cafe:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8972:8971"      # web UI
      - "8556:8554"      # RTSP
      - "8557:8555/tcp"  # WebRTC
      - "8557:8555/udp"  # WebRTC

  # center11 = پذیرش و هتل (reception)
  frigate-center11:
    <<: *frigate-common
    container_name: frigate-center11
    volumes:
      - ./config/center11:/config
      - ./media/center11:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8973:8971"
      - "8558:8554"
      - "8559:8555/tcp"
      - "8559:8555/udp"

  # center22 = پارکینگ (parking)
  frigate-center22:
    <<: *frigate-common
    container_name: frigate-center22
    volumes:
      - ./config/center22:/config
      - ./media/center22:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8974:8971"
      - "8560:8554"
      - "8561:8555/tcp"
      - "8561:8555/udp"

  frigate-restaurant:
    <<: *frigate-common
    container_name: frigate-restaurant
    volumes:
      - ./config/restaurant:/config
      - ./media/restaurant:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8975:8971"
      - "8562:8554"
      - "8563:8555/tcp"
      - "8563:8555/udp"

  frigate-sahel:
    <<: *frigate-common
    container_name: frigate-sahel
    volumes:
      - ./config/sahel:/config
      - ./media/sahel:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8976:8971"
      - "8564:8554"
      - "8565:8555/tcp"
      - "8565:8555/udp"

  frigate-villa:
    <<: *frigate-common
    container_name: frigate-villa
    volumes:
      - ./config/villa:/config
      - ./media/villa:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8977:8971"
      - "8566:8554"
      - "8567:8555/tcp"
      - "8567:8555/udp"

  frigate-mahoote:
    <<: *frigate-common
    container_name: frigate-mahoote
    volumes:
      - ./config/mahoote:/config
      - ./media/mahoote:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8978:8971"
      - "8568:8554"
      - "8569:8555/tcp"
      - "8569:8555/udp"

  # Host metrics + SQLite audit log (login/logout)
  portal-metrics:
    image: python:3.12-alpine
    container_name: portal-metrics
    restart: unless-stopped
    command: ["python3", "/app/portal-api.py"]
    environment:
      PORTAL_DB: /data/portal.db
    volumes:
      - ./portal/portal-api.py:/app/portal-api.py:ro
      - ./data/portal:/data
      - /proc:/host/proc:ro
    expose:
      - "9090"

  portal:
    image: nginx:alpine
    container_name: cctv-portal
    restart: unless-stopped
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      - ./portal:/usr/share/nginx/html:ro
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frigate-cafe
      - frigate-center11
      - frigate-center22
      - frigate-restaurant
      - frigate-sahel
      - frigate-villa
      - frigate-mahoote
      - portal-metrics

  portal-ssl:
    profiles: ["ssl"]
    image: nginx:alpine
    container_name: cctv-portal
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./portal:/usr/share/nginx/html:ro
      - ./portal/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frigate-cafe
      - frigate-center11
      - frigate-center22
      - frigate-restaurant
      - frigate-sahel
      - frigate-villa
      - frigate-mahoote
      - portal-metrics

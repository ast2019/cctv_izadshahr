# Portal nginx — HTTP mode (IP / port 8888) with subpath proxies for unified cookies
# For Let's Encrypt + subdomains, use: docker compose --profile ssl up -d

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — lets the TEMPORARY frigate-temp upstream be resolved
    # lazily (via a variable) so that if it's down, only /temp/ returns 502 and
    # the whole portal does NOT fail to start.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Let's Encrypt webroot (scripts/init-ssl.sh)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Portal static — never cache HTML/JS (avoids stale login credentials)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Health — hide Frigate 401 from browser console (any response = up)
    location = /health/cafe/ {
        proxy_pass https://frigate-cafe:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/center11/ {
        proxy_pass https://frigate-center11:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/center22/ {
        proxy_pass https://frigate-center22:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/restaurant/ {
        proxy_pass https://frigate-restaurant:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/sahel/ {
        proxy_pass https://frigate-sahel:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/villa/ {
        proxy_pass https://frigate-villa:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/mahoote/ {
        proxy_pass https://frigate-mahoote:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/tasisat/ {
        proxy_pass https://frigate-tasisat:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/entezamat/ {
        proxy_pass https://frigate-entezamat:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location = /health/anbar/ {
        proxy_pass https://frigate-anbar:8971/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    # TEMPORARY instance — remove with the frigate-temp service.
    # Uses a variable so nginx resolves lazily; if frigate-temp is down the
    # portal keeps working (this location just returns an error).
    location = /health/temp/ {
        set $temp_upstream frigate-temp:8971;
        proxy_pass https://$temp_upstream/api/version;
        proxy_ssl_verify off;
        proxy_intercept_errors on;
        error_page 401 403 = @health_ok;
    }
    location @health_ok {
        return 204;
    }

    location /api/ {
        proxy_pass http://portal-metrics:9090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frigate UI + API — subpath proxy via native X-Ingress-Path support.
    # Frigate rewrites its own baseUrl, so assets/api/ws all use /cafe/... paths.
    location /cafe/ {
        proxy_pass https://frigate-cafe:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /cafe;
        proxy_cookie_path / /cafe/;
        proxy_redirect / /cafe/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /center11/ {
        proxy_pass https://frigate-center11:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /center11;
        proxy_cookie_path / /center11/;
        proxy_redirect / /center11/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /center22/ {
        proxy_pass https://frigate-center22:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /center22;
        proxy_cookie_path / /center22/;
        proxy_redirect / /center22/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /restaurant/ {
        proxy_pass https://frigate-restaurant:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /restaurant;
        proxy_cookie_path / /restaurant/;
        proxy_redirect / /restaurant/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /sahel/ {
        proxy_pass https://frigate-sahel:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /sahel;
        proxy_cookie_path / /sahel/;
        proxy_redirect / /sahel/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /villa/ {
        proxy_pass https://frigate-villa:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /villa;
        proxy_cookie_path / /villa/;
        proxy_redirect / /villa/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /mahoote/ {
        proxy_pass https://frigate-mahoote:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /mahoote;
        proxy_cookie_path / /mahoote/;
        proxy_redirect / /mahoote/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /tasisat/ {
        proxy_pass https://frigate-tasisat:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /tasisat;
        proxy_cookie_path / /tasisat/;
        proxy_redirect / /tasisat/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /entezamat/ {
        proxy_pass https://frigate-entezamat:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /entezamat;
        proxy_cookie_path / /entezamat/;
        proxy_redirect / /entezamat/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /anbar/ {
        proxy_pass https://frigate-anbar:8971/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /anbar;
        proxy_cookie_path / /anbar/;
        proxy_redirect / /anbar/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # TEMPORARY instance — دوربین‌های شناسایی‌نشده. با سرویس frigate-temp حذف شود.
    # variable + rewrite → nginx نام را lazy resolve می‌کند؛ اگر temp خاموش باشد
    # فقط همین مسیر خطا می‌دهد و بقیه‌ی پرتال سالم می‌ماند.
    location /temp/ {
        set $temp_upstream frigate-temp:8971;
        rewrite ^/temp/(.*)$ /$1 break;
        proxy_pass https://$temp_upstream;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Ingress-Path /temp;
        proxy_cookie_path / /temp/;
        proxy_redirect / /temp/;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
